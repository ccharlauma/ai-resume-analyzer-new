<!DOCTYPE html>
<html>
<head>
<title>Analytics</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: Inter, sans-serif;
    background: #0b1120;
    color: white;
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 240px;
    height: 100vh;
    background: #0f172a;
    padding: 24px;
}

/* LINKS */
.sidebar a {
    text-decoration: none;
    color: #9ca3af;
    display: block;
    margin: 10px 0;
}

.sidebar a:hover {
    color: white;
}

/* MAIN */
.main {
    flex: 1;
    padding: 30px;
}

/* CARD */
.card {
    background: #020617;
    padding: 20px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.05);
}

.chart-container {
    max-width: 800px;
    margin: auto;
}

.card {
    margin-top: 20px;
}
canvas {
    max-height: 350px;
}
.card canvas {
    filter: drop-shadow(0 0 10px rgba(99,102,241,0.3));
}
</style>

</head>

<body>

<div style="margin-top:20px;"></div>

<!-- SIDEBAR -->
<div class="sidebar">

    <div style="margin-bottom:30px;">
        <div style="display:flex; align-items:center; gap:10px;">
            <div style="
                width:32px;
                height:32px;
                border-radius:8px;
                background:#4f46e5;
                display:flex;
                align-items:center;
                justify-content:center;
                font-weight:600;
                color:white;
            ">R</div>

            <div style="font-weight:600;">
                Resume<span style="color:#4f46e5;">AI</span>
            </div>
        </div>
    </div>

    <a href="/dashboard">Dashboard</a>
    <a href="/analytics" style="color:white;">Analytics</a>
    <a href="/profile">Profile</a>
    <a href="/logout">Logout</a>

</div>


<!-- MAIN -->
<div class="main">

    <!-- HEADER -->
    <div style="margin-bottom:30px;">
        <h2 style="margin:0;">Analytics</h2>
        <p style="color:#9ca3af; font-size:14px;">
            Track your resume performance over time
        </p>
    </div>

    <!-- STATS -->
    <div style="display:flex; gap:20px; margin-bottom:30px;">

        <div class="card" style="flex:1;">
            <p style="color:#9ca3af;">Average Score</p>
            <h2>{{ (scores|sum // scores|length) if scores else 0 }}%</h2>
        </div>

        <div class="card" style="flex:1;">
            <p style="color:#9ca3af;">Total Analyses</p>
            <h2>{{ scores|length }}</h2>
        </div>

        <div class="card" style="flex:1;">
            <p style="color:#9ca3af;">Best Score</p>
            <h2>{{ scores|max if scores else 0 }}%</h2>
        </div>

    </div>

    <!-- CHART -->
    <div class="card">
        <h3 style="margin-bottom:15px;">Score Trend</h3>
        <div class="chart-container">
            <div style="max-width:900px; margin:auto;">
                <canvas id="chart"></canvas>
            </div>
        </div>
    </div>

</div>

<script>
const scores = {{ scores|tojson }};

new Chart(document.getElementById("chart"), {
    type: 'line',
    data: {
        labels: scores.map((_, i) => "Try " + (i + 1)),
        datasets: [{
            label: "Score",
            data: scores,
            borderColor: "#6366f1",
            backgroundColor: "rgba(99,102,241,0.15)",
            fill: true,
            tension: 0.5,
            pointRadius: 5,
            pointHoverRadius: 7
        }]
    },
    options: {
        responsive: true,
        animation: {
            duration: 1500,
            easing: 'easeInOutQuart'
        },
        plugins: {
            legend: {
                labels: { color: "#cbd5e1" }
            }
        },
        scales: {
            x: {
                ticks: { color: "#9ca3af" },
                grid: { color: "rgba(255,255,255,0.05)" }
            },
            y: {
                ticks: { color: "#9ca3af" },
                grid: { color: "rgba(255,255,255,0.05)" }
            }
        }
    }
});
</script>

</body>
</html>
